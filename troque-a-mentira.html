<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Troque a Mentira · Tetelestai</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --vinho: #5c1320;
        --vinho-escuro: #3d0d16;
        --bege: #f1e6d2;
        --bege-escuro: #dcc9a3;
        --branco: #ffffff;
        --marrom-claro: #9c7748;
        --marrom-medio: #7c5a36;
        --marrom-texto: #6b4a2e;
        --pedra-1: #8a7763;
        --pedra-2: #6f6052;
        --pedra-3: #564a3f;
        --argamassa: #2a211b;
        --sombra: rgba(0, 0, 0, 0.18);
        font-size: 16px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", Arial, sans-serif;
        background: var(--bege);
        color: var(--vinho-escuro);
        min-height: 100vh;
      }

      .icon-sprite {
        width: 0;
        height: 0;
        position: absolute;
        overflow: hidden;
      }

      .app {
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
        background: var(--branco);
        box-shadow: 0 0 40px var(--sombra);
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
      }

      /* HEADER */
      .topbar {
        background: var(--vinho);
        padding: 14px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .logo-mark {
        width: 34px;
        height: 34px;
        color: var(--bege);
        flex-shrink: 0;
      }
      .brand-block {
        display: flex;
        flex-direction: column;
        line-height: 1.1;
      }
      .brand {
        font-family: "Cormorant Garamond", Georgia, serif;
        color: var(--bege);
        letter-spacing: 3px;
        font-weight: 600;
        font-size: 1.05rem;
      }
      .brand-sub {
        color: var(--marrom-claro);
        font-size: 0.62rem;
        letter-spacing: 1.5px;
        text-transform: uppercase;
      }

      .app-footer {
        text-align: center;
        font-size: 0.7rem;
        letter-spacing: 1px;
        color: var(--marrom-claro);
        padding: 14px 0 22px;
        max-width: 480px;
        margin: 0 auto;
        width: 100%;
      }

      /* SCREENS */
      .screen {
        display: none;
        flex: 1;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 40px 24px 50px;
        animation: fadeIn 0.4s ease;
      }
      .screen.active {
        display: flex;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .icon-hero {
        width: 42px;
        height: 42px;
        color: var(--marrom-claro);
        margin-bottom: 14px;
      }
      .icon-hero.glow {
        filter: drop-shadow(0 0 10px rgba(156, 119, 72, 0.6));
      }

      .title {
        font-family: "Cormorant Garamond", Georgia, serif;
        color: var(--vinho);
        font-size: 1.65rem;
        font-weight: 700;
        line-height: 1.3;
        letter-spacing: 0.5px;
        margin-bottom: 14px;
      }

      .subtitle {
        color: var(--marrom-texto);
        font-size: 0.95rem;
        line-height: 1.5;
        margin-bottom: 26px;
      }

      /* MUROS GRID */
      .muros-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        width: 100%;
        margin-bottom: 24px;
      }

      .muro-card {
        background: var(--bege);
        border: 1px solid var(--bege-escuro);
        border-radius: 10px;
        padding: 18px 10px;
        color: var(--vinho);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        transition:
          transform 0.15s,
          background 0.15s,
          color 0.15s;
      }
      .muro-icon {
        width: 26px;
        height: 26px;
        color: currentColor;
      }
      .muro-card span {
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.3px;
      }
      .muro-card:hover {
        background: var(--marrom-claro);
        color: var(--branco);
        transform: translateY(-2px);
      }

      .hint {
        color: var(--marrom-claro);
        font-size: 0.8rem;
        margin-top: 18px;
      }
      .pulse {
        animation: pulse 1.6s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
      }

      .modules-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        margin-top: auto;
        padding-top: 24px;
      }
      .module-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--bege);
        border: 1px solid var(--bege-escuro);
        color: var(--vinho);
        font-size: 0.72rem;
        font-weight: 600;
        text-decoration: none;
        padding: 8px 12px;
        border-radius: 20px;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .module-chip:hover {
        background: var(--marrom-claro);
        color: var(--branco);
      }
      .module-chip .inline-icon {
        width: 15px;
        height: 15px;
      }

      .link-estudos {
        margin-top: 14px;
        padding-top: 18px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--vinho);
        font-size: 0.85rem;
        font-weight: 600;
        text-decoration: none;
        border-top: 1px solid var(--bege-escuro);
        width: 100%;
        justify-content: center;
      }

      .inline-icon {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
        color: var(--marrom-claro);
      }

      /* MURO DE PEDRA */
      .wall-visual {
        width: 230px;
        height: 230px;
        margin: 10px 0 20px;
        cursor: pointer;
        position: relative;
        border-radius: 4px;
        box-shadow: 0 10px 24px var(--sombra);
      }

      .wall-bricks {
        position: absolute;
        inset: 0;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(5, 1fr);
        gap: 3px;
        border-radius: 4px;
        overflow: hidden;
      }

      .brick {
        position: relative;
        background:
          radial-gradient(
            120% 140% at 20% 15%,
            rgba(255, 255, 255, 0.1),
            transparent 55%
          ),
          linear-gradient(
            155deg,
            var(--pedra-1),
            var(--pedra-2) 55%,
            var(--pedra-3)
          );
        box-shadow: inset 0 0 6px rgba(0, 0, 0, 0.35);
        transition:
          transform 0.5s ease,
          opacity 0.5s ease;
      }
      .brick::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          radial-gradient(
            circle at 30% 30%,
            rgba(0, 0, 0, 0.12) 0,
            transparent 35%
          ),
          radial-gradient(
            circle at 70% 65%,
            rgba(0, 0, 0, 0.1) 0,
            transparent 30%
          );
      }
      .brick.shift-a {
        filter: brightness(1.08);
      }
      .brick.shift-b {
        filter: brightness(0.92);
      }
      .brick.shift-c {
        filter: brightness(1);
      }

      .crack-overlay {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
      .crack {
        fill: none;
        stroke: var(--argamassa);
        stroke-width: 2.4;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0;
        filter: drop-shadow(0 0 1px rgba(0, 0, 0, 0.6));
        transition: opacity 0.35s ease;
      }
      .crack-1.show,
      .crack-2.show,
      .crack-3.show {
        opacity: 0.9;
      }

      #wall-label {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--bege);
        font-family: "Cormorant Garamond", Georgia, serif;
        font-weight: 700;
        font-size: 1.3rem;
        letter-spacing: 2px;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
        pointer-events: none;
      }

      .wall-visual.shaking .wall-bricks {
        animation: shake 0.35s;
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-5px) rotate(-0.5deg);
        }
        75% {
          transform: translateX(5px) rotate(0.5deg);
        }
      }

      /* TETELESTAI */
      .scene-sky {
        width: 100%;
        height: 150px;
        background: linear-gradient(180deg, var(--marrom-claro), var(--bege));
        border-radius: 8px;
        margin-bottom: 24px;
        position: relative;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding-bottom: 14px;
      }
      .scene-cross {
        width: 46px;
        height: 46px;
        color: var(--vinho-escuro);
      }

      .tetelestai-mark {
        font-family: "Cormorant Garamond", Georgia, serif;
        color: var(--vinho);
        font-weight: 700;
        font-size: 1.5rem;
        letter-spacing: 2px;
        margin: 16px 0 30px;
        line-height: 1.6;
      }
      .tetelestai-mark span {
        display: block;
        font-size: 0.85rem;
        font-family: "Inter", Arial, sans-serif;
        font-weight: 600;
        color: var(--marrom-texto);
        letter-spacing: 1px;
      }

      .btn-primary {
        background: var(--marrom-claro);
        color: var(--branco);
        border: none;
        padding: 14px 32px;
        border-radius: 6px;
        font-weight: 700;
        letter-spacing: 1px;
        font-size: 0.9rem;
        cursor: pointer;
        margin-top: 8px;
        transition: background 0.15s;
      }
      .btn-primary:hover {
        background: var(--vinho);
      }
      .btn-primary.big {
        padding: 18px 40px;
        font-size: 1.05rem;
      }

      .btn-secondary {
        background: transparent;
        color: var(--vinho);
        border: 1px solid var(--marrom-claro);
        padding: 12px 28px;
        border-radius: 6px;
        font-weight: 600;
        margin-top: 24px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
      }
      .btn-secondary .inline-icon {
        color: var(--vinho);
      }

      .meaning-list {
        list-style: none;
        width: 100%;
        text-align: left;
        margin-bottom: 24px;
      }
      .meaning-list li {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 14px;
        background: var(--bege);
        border-radius: 8px;
        margin-bottom: 8px;
        font-size: 0.9rem;
        color: var(--vinho-escuro);
      }
      .meaning-list .inline-icon {
        width: 22px;
        height: 22px;
      }

      .verse {
        color: var(--marrom-texto);
        font-style: italic;
        font-size: 0.9rem;
        line-height: 1.5;
        margin-bottom: 26px;
      }
      .verse strong {
        display: block;
        font-style: normal;
        color: var(--vinho);
        margin-top: 6px;
        letter-spacing: 1px;
      }

      #mural-input {
        width: 100%;
        min-height: 70px;
        border: 1px solid var(--bege-escuro);
        border-radius: 8px;
        background: var(--bege);
        padding: 12px;
        font-family: "Inter", Arial, sans-serif;
        font-size: 0.9rem;
        resize: none;
        margin-bottom: 12px;
        color: var(--vinho-escuro);
      }

      .mural-wall {
        width: 100%;
        margin-top: 36px;
        padding-top: 24px;
        border-top: 1px solid var(--bege-escuro);
      }
      .mural-wall h3 {
        font-family: "Cormorant Garamond", Georgia, serif;
        color: var(--vinho);
        margin-bottom: 4px;
        font-size: 1.2rem;
      }

      .mural-cloud {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        margin-top: 16px;
        min-height: 40px;
      }
      .mural-cloud span {
        color: var(--marrom-claro);
        font-weight: 600;
      }
      .mural-cloud span:nth-child(odd) {
        color: var(--vinho);
        font-size: 1.05em;
      }
      .mural-cloud .empty {
        color: var(--marrom-texto);
        font-size: 0.85rem;
        font-style: italic;
      }

      @media (max-width: 380px) {
        .title {
          font-size: 1.4rem;
        }
        .wall-visual {
          width: 190px;
          height: 190px;
        }
      }

      /* TELAS DE MÓDULO (genérico) */
      .module-screen {
        padding-top: 36px;
      }

      /* arquivo: ESTUDOS */
      .estudos-list {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 8px;
      }
      .estudo-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        background: var(--bege);
        border: 1px solid var(--bege-escuro);
        border-radius: 10px;
        padding: 14px 16px;
        text-decoration: none;
        transition: background 0.15s;
      }
      .estudo-card:hover {
        background: var(--bege-escuro);
      }
      .estudo-info {
        display: flex;
        flex-direction: column;
        gap: 3px;
        text-align: left;
      }
      .estudo-numero {
        font-size: 0.68rem;
        letter-spacing: 1.5px;
        color: var(--marrom-claro);
        font-weight: 700;
      }
      .estudo-titulo {
        font-size: 0.88rem;
        color: var(--vinho-escuro);
        font-weight: 600;
      }
      .estudo-card .inline-icon {
        flex-shrink: 0;
      }

      /* TROQUE A MENTIRA */
      .lies-list {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 8px;
        perspective: 800px;
      }
      .lie-card {
        background: none;
        border: none;
        padding: 0;
        cursor: pointer;
        height: 64px;
      }
      .lie-card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transition: transform 0.5s;
        transform-style: preserve-3d;
      }
      .lie-card.flipped .lie-card-inner {
        transform: rotateX(180deg);
      }
      .lie-face {
        position: absolute;
        inset: 0;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        backface-visibility: hidden;
        font-weight: 600;
        font-size: 0.88rem;
        padding: 0 18px;
        text-align: center;
      }
      .lie-front {
        background: #6e2430;
        color: var(--bege);
        border: 1px solid #8a3340;
      }
      .lie-front .inline-icon {
        color: var(--bege);
        opacity: 0.7;
        width: 16px;
        height: 16px;
      }
      .lie-back {
        background: var(--marrom-claro);
        color: var(--branco);
        transform: rotateX(180deg);
      }

      /* arquivo: O PESO */
      .peso-scene {
        position: relative;
        width: 100%;
        height: 300px;
        margin-bottom: 6px;
      }
      .pesos-area {
        position: absolute;
        inset: 0;
        z-index: 2;
      }
      .peso-item {
        position: absolute;
        background: linear-gradient(155deg, var(--pedra-1), var(--pedra-3));
        color: var(--bege);
        border: none;
        border-radius: 8px;
        padding: 10px 14px;
        font-weight: 700;
        font-size: 0.76rem;
        cursor: pointer;
        box-shadow:
          inset 0 0 6px rgba(0, 0, 0, 0.3),
          0 4px 8px var(--sombra);
        transition:
          transform 0.55s cubic-bezier(0.55, 0, 0.85, 0.35),
          opacity 0.5s ease;
      }
      .peso-item.entregue {
        pointer-events: none;
      }

      .bag-wrap {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 170px;
        z-index: 1;
      }
      .bag-svg {
        width: 100%;
        display: block;
      }
      .bag-svg.bounce {
        animation: bagBounce 0.4s ease;
      }
      @keyframes bagBounce {
        0% {
          transform: scale(1);
        }
        40% {
          transform: scale(1.06, 0.94) translateY(3px);
        }
        100% {
          transform: scale(1);
        }
      }
      .bag-opening {
        position: absolute;
        top: 4%;
        left: 50%;
        width: 2px;
        height: 2px;
      }

      /* Notificação */
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(61, 13, 22, 0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
        z-index: 50;
      }
      .overlay.show {
        opacity: 1;
        pointer-events: auto;
      }
      .overlay-card {
        background: var(--branco);
        border-radius: 14px;
        padding: 32px 26px;
        max-width: 320px;
        text-align: center;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.3);
        transform: translateY(10px) scale(0.96);
        transition: transform 0.3s ease;
      }
      .overlay.show .overlay-card {
        transform: translateY(0) scale(1);
      }
      .overlay-icon {
        width: 46px;
        height: 46px;
        color: var(--marrom-claro);
        margin-bottom: 12px;
      }
      .overlay-card h3 {
        font-family: "Cormorant Garamond", Georgia, serif;
        color: var(--vinho);
        font-size: 1.4rem;
        margin-bottom: 10px;
      }
      .overlay-card p {
        color: var(--marrom-texto);
        font-size: 0.88rem;
        line-height: 1.5;
        margin-bottom: 20px;
      }

      /* arquivo: A CONTA PAGA */
      .receipt {
        width: 100%;
        background: var(--bege);
        border: 1px dashed var(--bege-escuro);
        border-radius: 4px;
        padding: 22px 18px;
        margin-bottom: 24px;
        position: relative;
        overflow: hidden;
        font-family: "Inter", monospace;
        box-shadow: 0 10px 26px var(--sombra);
        clip-path: polygon(
          0% 2%,
          4% 0%,
          8% 2%,
          12% 0%,
          16% 2%,
          20% 0%,
          24% 2%,
          28% 0%,
          32% 2%,
          36% 0%,
          40% 2%,
          44% 0%,
          48% 2%,
          52% 0%,
          56% 2%,
          60% 0%,
          64% 2%,
          68% 0%,
          72% 2%,
          76% 0%,
          80% 2%,
          84% 0%,
          88% 2%,
          92% 0%,
          96% 2%,
          100% 0%,
          100% 98%,
          96% 100%,
          92% 98%,
          88% 100%,
          84% 98%,
          80% 100%,
          76% 98%,
          72% 100%,
          68% 98%,
          64% 100%,
          60% 98%,
          56% 100%,
          52% 98%,
          48% 100%,
          44% 98%,
          40% 100%,
          36% 98%,
          32% 100%,
          28% 98%,
          24% 100%,
          20% 98%,
          16% 100%,
          12% 98%,
          8% 100%,
          4% 98%,
          0% 100%
        );
      }
      .receipt-watermark {
        position: absolute;
        top: 48%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(-22deg);
        font-family: "Cormorant Garamond", Georgia, serif;
        font-weight: 700;
        font-size: 1.9rem;
        letter-spacing: 3px;
        color: var(--vinho);
        opacity: 0;
        white-space: nowrap;
        transition: opacity 0.6s ease;
        pointer-events: none;
      }
      .receipt-watermark.show {
        opacity: 0.12;
      }
      .receipt-head {
        text-align: center;
        font-weight: 700;
        letter-spacing: 2px;
        color: var(--vinho);
        margin-bottom: 14px;
        border-bottom: 1px dashed var(--bege-escuro);
        padding-bottom: 10px;
        position: relative;
      }
      .receipt-list {
        list-style: none;
        position: relative;
      }
      .receipt-list li {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
        font-size: 0.85rem;
        color: var(--vinho-escuro);
      }
      .stamp-mini {
        font-weight: 700;
        color: #8a3340;
        transition: color 0.2s;
      }
      .receipt-list li.paid .stamp-mini {
        color: var(--marrom-claro);
      }
      .receipt-total {
        display: flex;
        justify-content: space-between;
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px dashed var(--bege-escuro);
        font-weight: 700;
        color: var(--vinho);
        position: relative;
      }
      .receipt-stamp {
        position: absolute;
        top: 34%;
        right: 14px;
        display: flex;
        align-items: center;
        gap: 4px;
        border: 3px double #8a3340;
        color: #8a3340;
        font-weight: 700;
        letter-spacing: 2px;
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 0.95rem;
        transform: rotate(-18deg) scale(0);
        opacity: 0;
        transition:
          transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
          opacity 0.3s ease;
      }
      .receipt-stamp .inline-icon {
        width: 16px;
        height: 16px;
        color: #8a3340;
      }
      .receipt-stamp.show {
        transform: rotate(-18deg) scale(1);
        opacity: 0.92;
      }
      .receipt.shine {
        animation: shineSweep 1s ease;
      }
      @keyframes shineSweep {
        0% {
          box-shadow: 0 10px 26px var(--sombra);
        }
        50% {
          box-shadow:
            0 10px 26px var(--sombra),
            0 0 28px rgba(156, 119, 72, 0.55);
        }
        100% {
          box-shadow: 0 10px 26px var(--sombra);
        }
      }

      .verse-spaced {
        margin-top: 26px;
      }
    </style>
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true">
      <defs>
        <symbol id="icon-logo" viewBox="0 0 120 120">
          <circle
            cx="60"
            cy="62"
            r="46"
            fill="none"
            stroke="currentColor"
            stroke-width="5"
            stroke-linecap="round"
            opacity="0.85"
          />
          <path
            d="M38 78 L42 52 L52 66 L60 44 L68 66 L78 52 L82 78 Z"
            fill="none"
            stroke="currentColor"
            stroke-width="4.5"
            stroke-linejoin="round"
            stroke-linecap="round"
          />
          <line
            x1="38"
            y1="84"
            x2="82"
            y2="84"
            stroke="currentColor"
            stroke-width="4.5"
            stroke-linecap="round"
          />
          <circle cx="42" cy="50" r="4" fill="currentColor" />
          <circle cx="60" cy="42" r="4" fill="currentColor" />
          <circle cx="78" cy="50" r="4" fill="currentColor" />
        </symbol>
        <symbol id="icon-casa" viewBox="0 0 24 24">
          <path
            d="M4 11 L12 4 L20 11 M6 10 V19 H18 V10"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linejoin="round"
            stroke-linecap="round"
          />
        </symbol>
        <symbol id="icon-virar" viewBox="0 0 24 24">
          <path
            d="M3 12 a9 9 0 0 1 15-6.7 M21 5 V9 H17 M21 12 a9 9 0 0 1-15 6.7 M3 19 V15 H7"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </symbol>
      </defs>
    </svg>

    <div class="app">
      <header class="topbar">
        <svg class="logo-mark"><use href="#icon-logo" /></svg>
        <div class="brand-block">
          <span class="brand">TETELESTAI</span>
          <span class="brand-sub">Geração Ativa</span>
        </div>
      </header>

      <section class="screen active module-screen">
        <h1 class="title">TROQUE<br />A MENTIRA</h1>
        <p class="subtitle">
          Substitua as mentiras que você ouve<br />pelas verdades que Deus diz
          sobre você.
        </p>

        <div class="lies-list" id="lies-list">
          /* deixei os cards gerados via JS */
        </div>

        <a href="index.html" class="btn-secondary"
          ><svg class="inline-icon"><use href="#icon-casa" /></svg> Voltar ao
          início</a
        >
      </section>
    </div>

    <footer class="app-footer">
      Geração Ativa &middot; Tetelestai Experience
    </footer>

    <script>
      const pares = [
        {
          mentira: "Não sou suficiente",
          verdade: "Você é amado e capaz em Cristo",
        },
        {
          mentira: "Ninguém me entende",
          verdade: "Deus te conhece profundamente",
        },
        {
          mentira: "Eu não mereço perdão",
          verdade: "Pela graça você já foi perdoado",
        },
        {
          mentira: "Estou sozinho nessa luta",
          verdade: "Ele nunca vai te abandonar",
        },
        {
          mentira: "Preciso ser perfeito",
          verdade: "Sua força se aperfeiçoa na fraqueza",
        },
        {
          mentira: "Meu passado me define",
          verdade: "Em Cristo você é uma nova criação",
        },
      ];

      const lista = document.getElementById("lies-list");
      pares.forEach((par, i) => {
        const card = document.createElement("button");
        card.className = "lie-card";
        card.innerHTML = `
    <div class="lie-card-inner">
      <div class="lie-face lie-front">
        <svg class="inline-icon"><use href="#icon-virar"/></svg>
        <span>${par.mentira}</span>
      </div>
      <div class="lie-face lie-back">
        <span>${par.verdade}</span>
      </div>
    </div>`;
        card.addEventListener("click", () => card.classList.toggle("flipped"));
        lista.appendChild(card);
      });
    </script>
  </body>
</html>
